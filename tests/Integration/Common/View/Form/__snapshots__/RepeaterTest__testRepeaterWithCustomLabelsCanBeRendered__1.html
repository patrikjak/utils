<html><body>
<div class="pj-repeater" data-min="1">
    <div class="pj-repeater-rows">
        <div class="pj-repeater-row" data-index="0">
            <div class="pj-classic">
            <label for="items[0][name]">Name</label>
    
            <input type="text" id="items[0][name]" name="items[0][name]">
    
    </div>
            <button type="button" class="pj-repeater-remove" disabled>
                Delete
            </button>
        </div>
    </div>

    <template class="pj-repeater-template">
        <div class="pj-repeater-row" data-index="{index}">
            <div class="pj-classic">
            <label for="items[{index}][name]">Name</label>
    
            <input type="text" id="items[{index}][name]" name="items[{index}][name]">
    
    </div>
            <button type="button" class="pj-repeater-remove">Delete</button>
        </div>
    </template>

    <button type="button" class="pj-repeater-add pj-btn">
        + Add item
    </button>
</div>
</body></html>
